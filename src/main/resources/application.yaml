spring:
  application:
    name: Nexus WMS

  # --- Database (PostgreSQL via Docker Compose) ---
  datasource:
    url: jdbc:postgresql://localhost:5432/nexus_wms
    username: nexus
    password: nexus123
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  # --- Flyway ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- RFC 7807 Problem Details ---
  mvc:
    problemdetails:
      enabled: true

  # --- Docker Compose (auto-start) ---
  docker:
    compose:
      lifecycle-management: start-only
